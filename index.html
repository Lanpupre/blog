<html lang="zh-CN">
<head>

    <meta charset="UTF-8">

    <title>霜岚</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-teal: #00b4d8;
            --light-teal: #90e0ef;
            --dark-teal: #0077b6;
            --highlight-green: #2a9d8f;
            --text-light: #e0fbfc;
            --card-bg: rgba(202, 240, 248, 0.15);
        }
        /* ———— 高级预加载 ———— */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #006d77, #00b4d8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 0.6s cubic-bezier(0.6, 0.04, 0.98, 0.335);
        }
        #preloader.hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(1.05);
        }
        /* 渐变圆环加载器 */
        .gradient-loader {
            width: 70px;
            height: 70px;
            position: relative;
        }
        .gradient-loader::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 100%;
            border: 3.5px solid transparent;
            border-top-color: #2a9d8f;
            border-right-color: #00b4d8;
            animation: spin 1s linear infinite;
        }
        .gradient-loader::after {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 100%;
            border: 2px solid transparent;
            border-bottom-color: rgba(255,255,255,0.3);
            animation: spin 1.2s linear reverse infinite;
        }

        /* 加载文字 */
        .loading-text {
            margin-top: 24px;
            font-size: 15px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 1.2px;
            animation: fade 1.8s infinite alternate;
        }
        @keyframes fade {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* ———— 顶配高级生日彩蛋 ———— */
        #birthdayEgg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 40, 50, 0.85);
            backdrop-filter: blur(15px);
            z-index: 9998;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.8s ease;
        }
        #birthdayEgg.show {
            opacity: 1;
            visibility: visible;
        }
        .birthday-card {
            background: linear-gradient(135deg, rgba(0, 119, 182, 0.3), rgba(42, 157, 143, 0.3));
            border: 2px solid rgba(0, 180, 216, 0.6);
            border-radius: 25px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 180, 216, 0.4);
            position: relative;
            overflow: hidden;
            animation: cardFloat 3s ease-in-out infinite;
        }
        .birthday-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0, 180, 216, 0.2), transparent);
            animation: lightSweep 6s linear infinite;
        }
        @keyframes cardFloat {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes lightSweep {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .birthday-icon {
            font-size: 6rem;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 15px var(--highlight-green));
            animation: iconPulse 2s ease-in-out infinite;
        }
        @keyframes iconPulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .birthday-title {
            font-size: 2.5rem;
            background: linear-gradient(45deg, var(--light-teal), var(--highlight-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        .birthday-text {
            font-size: 1.2rem;
            color: var(--text-light);
            min-height: 30px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }
        .birthday-close {
            padding: 12px 35px;
            background: linear-gradient(45deg, var(--highlight-green), var(--primary-teal));
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(42, 157, 143, 0.4);
        }
        .birthday-close:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 20px rgba(0, 180, 216, 0.5);
        }
        /* 烟花画布 */
        #fireworks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* ———— 原有样式不变 ———— */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #006d77, #00b4d8);

            overflow-x: hidden;

            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(0, 95, 115, 0.7);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 180, 216, 0.4);
            position: relative;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--highlight-green), var(--primary-teal));
        }
        header {
            text-align: center;
            padding: 50px 20px 30px;
            position: relative;
            background: rgba(0, 53, 64, 0.5);
            border-bottom: 1px solid rgba(0, 180, 216, 0.3);
        }
        .avatar {
            width: 140px;

            border: 3px solid var(--primary-teal);

        h1 {

        .subtitle {

            font-size: 1.3rem;

        }
        .tagline {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(42, 157, 143, 0.2);
            border: 1px solid var(--highlight-green);
            border-radius: 30px;
            font-size: 1.1rem;
            margin-top: 15px;
            color: #e9f5db;
        }
        .about-section {
            text-align: center;
            padding: 40px;
            position: relative;
        }
        .about-section::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-teal), transparent);
        }
        h2 {
            color: var(--light-teal);
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
        }
        h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--highlight-green), transparent);
        }
        .about-content {
            max-width: 700px;
            margin: 0 auto;
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-light);
        }
        .about-content p {
            margin-bottom: 25px;
            text-align: left;
        }
        .highlight {
            color: var(--highlight-green);
            font-weight: bold;
            text-shadow: 0 0 5px rgba(42, 157, 143, 0.4);
        }
        .social-section {
            text-align: center;
            padding: 50px 40px;
            background: rgba(0, 53, 64, 0.6);
        }
        .social-title {
            color: var(--text-light);
            font-size: 2.2rem;
            margin-bottom: 50px;
            text-shadow: 0 0 10px rgba(0, 180, 216, 0.7);
            position: relative;
        }
        .social-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: var(--highlight-green);
        }
        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 40px;
            max-width: 700px;
            margin: 0 auto;
        }
        .social-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 220px;
            padding: 30px 20px;
            background: rgba(0, 119, 182, 0.25);
            border: 2px solid var(--primary-teal);
            border-radius: 15px;
            text-decoration: none;
            color: white;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .social-link:hover {
            background: var(--primary-teal);
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 180, 216, 0.5);
            border-color: var(--highlight-green);
        }
        .social-link::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(42, 157, 143, 0.3), transparent);
            transform: rotate(45deg);
            z-index: 0;
            transition: all 0.8s;
        }
        .social-link:hover::before {
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .social-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            color: var(--light-teal);
            position: relative;
            z-index: 1;
            transition: all 0.4s;
        }
        .social-link:hover .social-icon {
            transform: scale(1.2);
            color: #e9f5db;
        }
        .social-name {
            font-size: 1.6rem;
            font-weight: bold;
            position: relative;
            z-index: 1;
            margin-bottom: 10px;
        }
        .social-desc {
            font-size: 1.1rem;
            color: var(--light-teal);
            position: relative;
            z-index: 1;
        }
        .social-link.qq {
            animation: pulse 2.5s infinite;
        }
        .social-link.bilibili .social-icon {
            color: #fb7299;
        }
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(202, 240, 248, 0.3);
            transform: scale(0);
            animation: ripple 6s linear infinite;
            pointer-events: none;
        }
        footer {
            text-align: center;
            padding: 30px 40px;
            color: var(--light-teal);
            font-size: 1rem;
            background: rgba(0, 53, 64, 0.7);
            border-top: 1px solid rgba(0, 180, 216, 0.3);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(42, 157, 143, 0.6); transform: scale(1); }
            50% { box-shadow: 0 0 0 20px rgba(42, 157, 143, 0.2); transform: scale(1.02); }
            100% { box-shadow: 0 0 0 0 rgba(42, 157, 0); transform: scale(1); }
        }
        @keyframes ripple {
            to { transform: scale(2.5); opacity: 0; }
        }
        @media (max-width: 768px) {
            .container { max-width: 95%; }
            h1 { font-size: 2.2rem; }
            .subtitle { font-size: 1.1rem; }
            .about-section, .social-section { padding: 30px 20px; }
            .social-links { flex-direction: column; align-items: center; gap: 30px; }
            .social-link { width: 100%; max-width: 300px; }
            .social-title { font-size: 1.8rem; margin-bottom: 40px; }
            .birthday-card { padding: 35px 25px; }
            .birthday-title { font-size: 2rem; }
            .birthday-icon { font-size: 5rem; }
        }
    </style>
</head>
<body>
    <!-- 预加载结构（替换原来的） -->
    <div id="preloader">

    </div>
     <!-- 顶配高级生日彩蛋 -->
    <div id="birthdayEgg">
       <canvas id="fireworks"></canvas>
        <div class="birthday-card">
            <div class="birthday-icon">🎂</div>
            <h2 class="birthday-title">霜岚 · 生日快乐</h2>
            <p class="birthday-text" id="typeText"></p>
            <button class="birthday-close" id="closeBirthday">开启新岁✨</button>
        </div>
    </div>

    <!-- 原有页面结构 -->
    <div class="container">
        <header>
            <img class="avatar" src="/1.png" alt="霜岚头像">
            <h1>霜岚</h1>
            <p class="subtitle">Furry| Arknights | Minecrft | 嗷呜～</p>
            <div class="tagline">连接 · 创造 · 分享</div>
        </header>
        <div class="about-section">

            <div class="about-content">
                <p>你好！咱是<span class="darklight">霜岚</span>，一名学生党，开学后经常不在线的兽兽，性格较好，可以把咱当情绪垃圾桶，当然，咱有时也需要你的帮助呢。</p>

            <h2 class="social-title">与我联系</h2>
            <div class="social-links">
                <a href="https://m.bilibili.com/space/3546651287357745?from=search" class="social-link bilibili" target="_blank">
                    <i class="fab fa-bilibili social-icon"></i>
                    <span class="social-name">Bilibili</span>
                </a>
                <a href="404.lanpupre.dpdns.org" class="social-link qq" target="_blank">
                    <i class="fab fa-qq social-icon"></i>
                    <span class="social-name">QQ</span>
                    </a>
                    <span class="social-desc">即时交流与沟通</span>
<div class="social-links">
    <div class="social-item">
        <i class="fas fa-envelope"></i>
        <h4>Email</h4>
        <p>欢迎邮件交流</p>
        <a href="mailto:lanpupre@163.com">联系我</a>

            </div>

    <script>
        // 预加载关闭
        window.addEventListener('load', function() {
            const preloader = document.getElementById('preloader');
            preloader.classList.add('hidden');
            setTimeout(checkBirthdayEgg, 600);
        });

        // ———— 顶配生日彩蛋逻辑 ————
        function checkBirthdayEgg() {
            const now = new Date();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            if(month === 6 && day === 27) {
                const egg = document.getElementById('birthdayEgg');
                egg.classList.add('show');
                initFireworks();
                typeWriter();
            }
        }

        // 打字机效果
        function typeWriter() {
            const text = "6月27日，岁岁常欢愉，万事皆胜意，愿我永远热烈自由";
            const ele = document.getElementById('typeText');
            let i = 0;
            function write() {
                if(i < text.length) {
                    ele.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(write, 80);
                }
            }
            write();
        }

        // 全屏烟花特效
        function initFireworks() {
            const canvas = document.getElementById('fireworks');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            class Firework {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height;
                    this.sx = Math.random() * 3 - 1.5;
                    this.sy = Math.random() * -3 - 3;
                    this.size = Math.random() + 1;
                    this.color = `hsl(${Math.random() * 60 + 160}, 100%, 50%)`;
                }
                update() {
                    this.x += this.sx;
                    this.y += this.sy;
                    this.sy += 0.02;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
            }
            
            let fireworks = [];
            function loop() {
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                if(Math.random() < 0.1) fireworks.push(new Firework());
                fireworks.forEach((f,i) => {
                    f.update();
                    f.draw();
                    if(f.y > canvas.height) fireworks.splice(i,1);
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        // 关闭彩蛋
        document.getElementById('closeBirthday').addEventListener('click', () => {
            document.getElementById('birthdayEgg').classList.remove('show');
        });

        // 原有JS功能
        document.querySelectorAll('.social-link').forEach(link => {
            link.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-10px) scale(1.05)';
            });
            link.addEventListener('mouseleave', function() {
                this.style.transform = '';
            });
        });
        const avatar = document.querySelector('.avatar');
        avatar.addEventListener('click', function() {
            this.classList.toggle('pulse');
        });
        document.addEventListener('click', function(e) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = e.clientX + 'px';
            ripple.style.top = e.clientY + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 6000);
        });
    </script>
